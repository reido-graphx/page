<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REIDO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/three0.144.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.144.0/examples/js/loaders/GLTFLoader.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0066cc;
            --bright: #00a8ff;
            --silver: #c0c0c0;
            --dark: #1a1a1a;
            --darker: #0d0d0d;
            --text-light: #fff;
            --text-dark: #000;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* --- الهيدر ثابت --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: rgba(13, 13, 13, 0.95);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 2rem;
            border-bottom: 2px solid var(--primary);
            z-index: 100;
        }
        .header img {
            width: 60px;
            height: 60px;
            border: 2px solid var(--primary);
            border-radius: 4px;        }

        /* --- البانر --- */
        .banner {
            position: fixed;
            top: 80px;
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, var(--primary), var(--bright), var(--silver));
            display: flex;
            z-index: 90;
        }

        .banner-left {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 2rem;
            color: var(--text-dark);
        }

        .banner-left h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .banner-left h2 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin: 0.5rem 0;
        }
        .banner-left p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 1rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1.1rem 2.5rem;
            background: linear-gradient(to right, #c0c0c0, #fff);
            color: #000;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 1rem;
            box-shadow: 0 6px 20px rgba(192, 192, 192, 0.4);
        }
        .banner-right {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            min-height: 250px;
        }
        #gltfCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
            border-radius: 8px;
        }

        /* --- المحتوى الرئيسي — يبدأ بعد البانر فقط --- */
        .main {
            margin-top: 380px; /* 80 + 300 */
            padding: 4rem 2rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            color: var(--text-light);
        }

        /* --- الفوتر --- */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 2px solid var(--primary);
            z-index: 100;
        }
        .footer p { color: var(--silver); }
        .social {
            display: flex;
            gap: 1.2rem;            margin-top: 1rem;
        }
        .social a {
            color: white;
            font-size: 1.4rem;
            width: 42px;
            height: 42px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .social a:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" alt="REIDO">
    </header>

    <div class="banner">
        <div class="banner-left">
            <h1>REIDO</h1>
            <h2>REAL EIDOLON SOFTWARE COMPANY</h2>
            <p>We turn creative ideas into tangible digital reality.<br>Professional experience in design and development.</p>
            <a href="#" class="btn">
                <i class="fas fa-images"></i> View Portfolio
            </a>
        </div>
        <div class="banner-right">
            <div id="canvas-container">
                <canvas id="gltfCanvas"></canvas>
            </div>
        </div>
    </div>

    <main class="main">
        <h2>Your Innovation, Our Code</h2>
        <p>This area is safely below the banner and above the footer.</p>
    </main>

    <footer class="footer">
        <p>&copy; 2026 REIDO. All rights reserved.</p>
        <div class="social">            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gltfCanvas');
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);

            // إضاءة قوية جدًا لضمان ظهور النموذج حتى لو كان داكنًا
            const ambient = new THREE.AmbientLight(0xffffff, 0.8); // ⬆️ 0.8 = إضاءة محيطية قوية
            scene.add(ambient);

            const dir = new THREE.DirectionalLight(0xffffff, 1);
            dir.position.set(10, 10, 10);
            scene.add(dir);

            camera.position.z = 10;

            let model;
            const loader = new THREE.GLTFLoader();

            loader.load(
                'logo.glb',
                (gltf) => {
                    model = gltf.scene;
                    model.scale.set(7, 7, 7); // ✅ 7x

                    // تمركز تلقائي
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    model.position.sub(center);

                    scene.add(model);
                },
                undefined,
                (err) => {
                    console.error("❌ GLB Load Failed:", err);
                    // رسم رسالة بديلة في الكانفاس إن فشل التحميل
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';                    ctx.fillText('3D MODEL LOADING...', canvas.width/2, canvas.height/2);
                }
            );

            function resize() {
                const w = canvas.clientWidth;
                const h = canvas.clientHeight;
                if (w !== canvas.width || h !== canvas.height) {
                    renderer.setSize(w, h, false);
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                if (model) model.rotation.y += 0.006;
                resize();
                renderer.render(scene, camera);
            }

            resize();
            animate();
        });
    </script>
</body>
</html>
